<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - الصفحة غير موجودة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap"
        rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
    body {
      background: linear-gradient(135deg, #0f172a, #1e3a5f);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      padding: 20px;
    }
    .number {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #06B6D4, #0891B2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 { font-size: 1.8rem; font-weight: 700; margin: 16px 0; }
    p { color: rgba(255,255,255,0.6); margin-bottom: 32px; }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: #06B6D4;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
      margin: 4px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; color: white; }
    .btn-outline {
      background: transparent;
      border: 2px solid rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div>
    <div class="number">404</div>
    <h1>الصفحة غير موجودة</h1>
    <p>الصفحة اللي بتدور عليها مش موجودة أو اتنقلت لمكان تاني</p>
    <div>
      <a href="/dashboard/" class="btn">
        🏠 الرئيسية
      </a>
      <a href="javascript:history.back()" class="btn btn-outline">
        ← رجوع
      </a>
    </div>
  </div>
</body>
</html>
