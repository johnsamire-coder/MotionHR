{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-ar="قريباً - MotionHR" data-en="Coming Soon - MotionHR">قريباً - MotionHR</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0D2E4D 0%, #0F172A 60%, #0E7490 100%);
      color: white;
      overflow-x: hidden;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      text-align: center;
    }

    .container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(6,182,212,0.15) 0%, transparent 60%);
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .content {
      position: relative;
      z-index: 2;
      max-width: 700px;
    }

    .icon-wrapper {
      width: 120px;
      height: 120px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #06B6D4 0%, #10B981 100%);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      box-shadow: 0 20px 60px rgba(6, 182, 212, 0.4);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .title {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #06B6D4 0%, #10B981 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: clamp(1rem, 2vw, 1.3rem);
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .info-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .info-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 24px 16px;
      border-radius: 16px;
      transition: all 0.3s ease;
    }

    .info-card:hover {
      background: rgba(6, 182, 212, 0.15);
      border-color: #06B6D4;
      transform: translateY(-5px);
    }

    .info-icon {
      font-size: 2rem;
      margin-bottom: 12px;
    }

    .info-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .info-text {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.7);
    }

    .cta-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #06B6D4 0%, #10B981 100%);
      color: white;
      box-shadow: 0 8px 24px rgba(6, 182, 212, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(6, 182, 212, 0.5);
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: white;
      color: white;
    }

    .lang-switch {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      z-index: 10;
    }

    .lang-switch:hover {
      background: rgba(6, 182, 212, 0.2);
      border-color: #06B6D4;
    }

    .back-home {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-family: 'Cairo', sans-serif;
      font-weight: 600;
      transition: all 0.2s ease;
      z-index: 10;
    }

    .back-home:hover {
      background: rgba(6, 182, 212, 0.2);
      color: white;
    }

    @media (max-width: 576px) {
      .lang-switch, .back-home {
        top: 12px;
        padding: 6px 12px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>

  <!-- Language Toggle -->
  <button class="lang-switch" onclick="toggleLanguage()">
    <span id="langLabel">EN</span>
  </button>

  <!-- Back to Home -->
  <a href="{% url 'landing:home' %}" class="back-home">
    <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
      <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>
    <span data-ar="الرئيسية" data-en="Home">الرئيسية</span>
  </a>

  <div class="container">
    <div class="content">

      <!-- Icon -->
      <div class="icon-wrapper">🚀</div>

      <!-- Title -->
      <h1 class="title" data-ar="قريباً جداً!" data-en="Coming Soon!">قريباً جداً!</h1>

      <!-- Subtitle -->
      <p class="subtitle" data-ar="بنشتغل على شيء رائع علشانك! هذه الميزة هتكون متاحة قريباً. اشترك في تجربتنا المجانية علشان تكون أول من يعرف" data-en="We're working on something amazing for you! This feature will be available soon. Sign up for our free trial to be the first to know">
        بنشتغل على شيء رائع علشانك! هذه الميزة هتكون متاحة قريباً. اشترك في تجربتنا المجانية علشان تكون أول من يعرف
      </p>

      <!-- Info Cards -->
      <div class="info-cards">
        <div class="info-card">
          <div class="info-icon">⏰</div>
          <div class="info-title" data-ar="قريباً" data-en="Coming Soon">قريباً</div>
          <div class="info-text" data-ar="خلال أيام قليلة" data-en="In just a few days">خلال أيام قليلة</div>
        </div>

        <div class="info-card">
          <div class="info-icon">📱</div>
          <div class="info-title" data-ar="Android + iOS" data-en="Android + iOS">Android + iOS</div>
          <div class="info-text" data-ar="متوافق مع كل الأجهزة" data-en="Compatible with all devices">متوافق مع كل الأجهزة</div>
        </div>

        <div class="info-card">
          <div class="info-icon">🎁</div>
          <div class="info-title" data-ar="مجاناً" data-en="Free">مجاناً</div>
          <div class="info-text" data-ar="بدون رسوم إضافية" data-en="No additional fees">بدون رسوم إضافية</div>
        </div>
      </div>

      <!-- CTA Buttons -->
      <div class="cta-buttons">
        <a href="{% url 'landing:free_trial' %}" class="btn btn-primary">
          <span>🚀</span>
          <span data-ar="احصل على عرض سعر الآن" data-en="Get Quote Now">احصل على عرض سعر الآن</span>
        </a>
        <a href="https://wa.me/201501551593" class="btn btn-secondary" target="_blank">
          <span>💬</span>
          <span data-ar="تواصل واتساب" data-en="WhatsApp">تواصل واتساب</span>
        </a>
      </div>

    </div>
  </div>

  <script>
    // Language Toggle
    function toggleLanguage() {
      const html = document.documentElement;
      const currentLang = html.getAttribute('lang') || 'ar';
      const newLang = currentLang === 'ar' ? 'en' : 'ar';
      const newDir = newLang === 'ar' ? 'rtl' : 'ltr';

      html.setAttribute('lang', newLang);
      html.setAttribute('dir', newDir);

      document.querySelectorAll('[data-ar][data-en]').forEach(el => {
        el.textContent = el.getAttribute('data-' + newLang);
      });

      const langLabel = document.getElementById('langLabel');
      if (langLabel) {
        langLabel.textContent = newLang === 'ar' ? 'EN' : 'عربي';
      }

      localStorage.setItem('motionhr_lang', newLang);
    }

    // Load saved language
    document.addEventListener('DOMContentLoaded', function() {
      const savedLang = localStorage.getItem('motionhr_lang');
      if (savedLang && savedLang !== 'ar') {
        toggleLanguage();
      }
    });
  </script>

</body>
</html>
